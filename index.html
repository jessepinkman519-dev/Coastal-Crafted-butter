<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coastal Creations — Compound Butter</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0B1F2A;
  color: #E8D9B5;
}

.hero {
  height: 70vh;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
              url('butter.jpg') center/cover no-repeat;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

h1 {
  margin: 0;
  font-size: 32px;
}

.section {
  padding: 25px;
}

.btn {
  display: block;
  margin: 10px 0;
  padding: 15px;
  text-align: center;
  background: #F4C542;
  color: black;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
}

#qrcode {
  background: white;
  padding: 10px;
  width: 180px;
  margin: auto;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <h1>Garlic Chive Butter</h1>
    <p>Crafted on the Oregon Coast</p>
  </div>
</div>

<div class="section">
  <h2>Perfect for</h2>
  <p>Steak • Bread • Seafood</p>
</div>

<div class="section">
  <h2>Our Story</h2>
  <p>Coastal Creations is built to elevate everyday meals with handcrafted, small-batch butter made with real ingredients.</p>
</div>

<div class="section">
  <a class="btn" href="#">Order More</a>
  <a class="btn" href="#">Follow Us</a>
</div>

<div class="section" style="text-align:center;">
  <h2>Scan & Share</h2>
  <div id="qrcode"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
new QRCode(document.getElementById("qrcode"), {
  text: window.location.href,
  width: 160,
  height: 160
});
</script>

</body>
</html>
